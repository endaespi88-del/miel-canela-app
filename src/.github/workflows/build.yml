.github/workflows/build.yml
name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Flet
        run: pip install flet
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build APK
        run: flet build apk src/main.py
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MielCanela-APK
          path: build/apk/*.apk
          
